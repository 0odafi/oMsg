<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>oMsg Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/web/styles.css" />
  </head>
  <body>
    <div class="bg-layer"></div>
    <div class="shell">
      <header class="topbar">
        <h1>oMsg</h1>
        <p>Messenger + Social Control Room</p>
      </header>

      <section class="auth card">
        <div class="auth-grid">
          <div>
            <h2>Register</h2>
            <div class="field">
              <label for="reg-username">Username</label>
              <input id="reg-username" placeholder="neo" />
            </div>
            <div class="field">
              <label for="reg-email">Email</label>
              <input id="reg-email" type="email" placeholder="neo@omsg.dev" />
            </div>
            <div class="field">
              <label for="reg-password">Password</label>
              <input id="reg-password" type="password" placeholder="********" />
            </div>
            <button id="register-btn">Create Account</button>
          </div>
          <div>
            <h2>Login</h2>
            <div class="field">
              <label for="login-login">Username or email</label>
              <input id="login-login" placeholder="neo" />
            </div>
            <div class="field">
              <label for="login-password">Password</label>
              <input id="login-password" type="password" placeholder="********" />
            </div>
            <button id="login-btn">Sign In</button>
          </div>
        </div>
        <p id="auth-status" class="status"></p>
      </section>

      <main class="workspace">
        <aside class="card column">
          <h3>Identity</h3>
          <button id="load-me-btn">Load Profile</button>
          <pre id="me-block">Not loaded</pre>

          <h3>Create Chat</h3>
          <div class="field">
            <label for="chat-title">Title</label>
            <input id="chat-title" placeholder="Core Team" />
          </div>
          <div class="field">
            <label for="chat-description">Description</label>
            <input id="chat-description" placeholder="Launch prep" />
          </div>
          <div class="field">
            <label for="chat-type">Type</label>
            <select id="chat-type">
              <option value="group">group</option>
              <option value="private">private</option>
              <option value="channel">channel</option>
            </select>
          </div>
          <div class="field">
            <label for="chat-members">Member IDs (comma)</label>
            <input id="chat-members" placeholder="2,3" />
          </div>
          <button id="create-chat-btn">Create Chat</button>

          <h3>My Chats</h3>
          <ul id="chat-list" class="list"></ul>
        </aside>

        <section class="card column wide">
          <h3 id="active-chat-title">No active chat</h3>
          <div id="message-list" class="messages"></div>
          <div class="compose">
            <input id="message-input" placeholder="Type message..." />
            <button id="send-message-btn">Send</button>
          </div>
          <p id="chat-status" class="status"></p>
        </section>

        <aside class="card column">
          <h3>Publish Post</h3>
          <textarea id="post-content" rows="4" placeholder="Share update..."></textarea>
          <div class="field">
            <label for="post-visibility">Visibility</label>
            <select id="post-visibility">
              <option value="public">public</option>
              <option value="followers">followers</option>
              <option value="private">private</option>
            </select>
          </div>
          <button id="create-post-btn">Publish</button>

          <h3>Feed</h3>
          <button id="load-feed-btn">Refresh Feed</button>
          <ul id="feed-list" class="list"></ul>

          <h3>Customization</h3>
          <div class="field">
            <label for="theme-name">Theme</label>
            <input id="theme-name" placeholder="neon-grid" />
          </div>
          <div class="field">
            <label for="accent-color">Accent color</label>
            <input id="accent-color" placeholder="#FF4D00" />
          </div>
          <button id="save-theme-btn">Save Theme</button>
          <button id="load-theme-btn" class="secondary">Load Theme</button>
          <pre id="theme-block">No settings</pre>
        </aside>
      </main>
    </div>

    <script type="module" src="/web/app.js"></script>
  </body>
</html>

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run backend tests
        env:
          SMS_PROVIDER: test
          AUTH_TEST_CODE: 12345
        run: pytest -q

  flutter-web-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: omsg_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter test
        run: flutter test

      - name: Build web smoke artifact
        run: flutter build web --release --dart-define=OMSG_API_BASE_URL=https://example.com

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: omsg-web-smoke
          path: omsg_app/build/web

  windows-client-build:
    runs-on: windows-latest
    if: github.event_name != 'pull_request'
    defaults:
      run:
        working-directory: omsg_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Windows client
        run: flutter build windows --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: omsg-windows-build
          path: omsg_app/build/windows/x64/runner/Release

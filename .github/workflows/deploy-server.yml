name: Deploy Server

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-server-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run backend tests
        env:
          SMS_PROVIDER: test
          AUTH_TEST_CODE: 12345
        run: pytest -q

  deploy:
    needs: backend-tests
    if: ${{ vars.DEPLOY_HOST != '' && secrets.DEPLOY_SSH_KEY != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        shell: bash
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          : "${DEPLOY_PORT:=22}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if printf '%s' "$DEPLOY_SSH_KEY" | grep -q 'BEGIN .* PRIVATE KEY'; then
            printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/omsg_deploy
          else
            printf '%s' "$DEPLOY_SSH_KEY" | base64 -d > ~/.ssh/omsg_deploy
          fi
          chmod 600 ~/.ssh/omsg_deploy
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy latest backend revision
        shell: bash
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          DEPLOY_BRANCH: ${{ vars.DEPLOY_BRANCH }}
          DEPLOY_APP_USER: ${{ vars.DEPLOY_APP_USER }}
          DEPLOY_APP_GROUP: ${{ vars.DEPLOY_APP_GROUP }}
        run: |
          : "${DEPLOY_PORT:=22}"
          : "${DEPLOY_USER:=root}"
          : "${DEPLOY_PATH:=/opt/omsg}"
          : "${DEPLOY_BRANCH:=${GITHUB_REF_NAME}}"
          : "${DEPLOY_APP_USER:=omsg}"
          : "${DEPLOY_APP_GROUP:=${DEPLOY_APP_USER}}"
          ssh -i ~/.ssh/omsg_deploy -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "sudo APP_DIR='${DEPLOY_PATH}' APP_USER='${DEPLOY_APP_USER}' APP_GROUP='${DEPLOY_APP_GROUP}' BRANCH='${DEPLOY_BRANCH}' bash '${DEPLOY_PATH}/deploy/ubuntu/update_git_deploy.sh'"
